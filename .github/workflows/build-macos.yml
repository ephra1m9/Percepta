name: Build macOS App

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow imagehash pymupdf opencv-python customtkinter pyinstaller

      - name: Build app
        run: pyinstaller "Find me Mac.spec"

      - name: Zip app bundle
        run: cd dist && zip -r "../Find-me-macOS-Apple-Silicon.zip" "Find me.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Find-me-macOS-Apple-Silicon
          path: Find-me-macOS-Apple-Silicon.zip
          retention-days: 30
