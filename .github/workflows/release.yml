name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow imagehash pymupdf opencv-python customtkinter pyinstaller

      - name: Build app
        run: pyinstaller "Find me.spec"

      - name: Zip app
        run: Compress-Archive -Path "dist\Find me" -DestinationPath "Find-me-Windows.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Find-me-Windows.zip

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow imagehash pymupdf opencv-python customtkinter pyinstaller

      - name: Build app
        run: pyinstaller "Find me Mac.spec"

      - name: Zip app bundle
        run: cd dist && zip -r "../Find-me-macOS-Apple-Silicon.zip" "Find me.app"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Find-me-macOS-Apple-Silicon.zip
